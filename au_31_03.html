<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Desafio IESGO</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background-color: #f4f4f4;
    }

    .container {
      display: grid;
      grid-template-columns: repeat(3, 100px);
      grid-template-rows: repeat(3, 100px);
      gap: 10px;
      align-items: center;
      justify-items: center;
    }

    .box {
      width: 80px;
      height: 80px;
      border: 2px solid black;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      background-color: white;
    }

    .text {
      font-size: 20px;
      font-weight: bold;
    }

    .empty {
      visibility: hidden;
    }
  </style>
</head>
<body>

  <div class="container">
    <!-- Linha 1 -->
    <div class="box">29</div>
    <div class="text">-</div>
    <div class="box">9</div>

    <!-- Linha 2 -->
    <div class="text">+</div>
    <div class="empty">x</div>
    <div class="text">+</div>

    <!-- Linha 3 -->
    <div class="box">6</div>
    <div class="text">+</div>
    <div class="box">11</div>
  </div>

  <div style="position: absolute; top: 20%; left: 65%; font-size: 20px;">
    = 20 <br><br>
    = 17 <br><br>
    35 &nbsp;&nbsp;&nbsp;&nbsp; 20
  </div>

</body>
</html>
