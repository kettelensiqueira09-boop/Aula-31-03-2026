<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Desafio</title>

<style>
body {
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  font-family: Arial;
}

.grid {
  display: grid;
  grid-template-columns: 80px 40px 80px 60px;
  grid-template-rows: 80px 40px 80px 40px;
  gap: 5px;
  align-items: center;
  justify-items: center;
}

.box {
  width: 70px;
  height: 70px;
  border: 2px solid black;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
}

.text {
  font-size: 20px;
}
</style>

</head>
<body>

<div class="grid">

  <!-- linha 1 -->
  <div class="box">24</div>
  <div class="text">-</div>
  <div class="box">4</div>
  <div class="text">= 20</div>

  <!-- linha 2 (sinais vertical) -->
  <div class="text">+</div>
  <div></div>
  <div class="text">+</div>
  <div></div>

  <!-- linha 3 -->
  <div class="box">1</div>
  <div class="text">+</div>
  <div class="box">16</div>
  <div class="text">= 17</div>

  <!-- linha 4 (resultados embaixo) -->
  <div class="text">= 25</div>
  <div></div>
  <div class="text">= 20</div>
  <div></div>

</div>

</body>
</html>
